<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMX Einstellungen</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="header">
    <h1>⚙️ Einstellungen</h1>
</div>

<div class="section">
    <h2>WLAN</h2>
    <label>SSID</label>
    <input id="sta_ssid" type="text">

    <label>Passwort</label>
    <input id="sta_pass" type="password">

    <button onclick="saveConfig()">💾 Speichern</button>
</div>

<div class="section">
    <h2>Beat‑Fade</h2>

    <label>
        <input type="checkbox" id="beatFadeEnabled">
        Beat‑Fade aktivieren
    </label>

    <label>
        <input type="checkbox" id="beatFadeKick">
        Kick
    </label>

    <label>
        <input type="checkbox" id="beatFadeSnare">
        Snare
    </label>

    <label>
        <input type="checkbox" id="beatFadeHiHat">
        Hi‑Hat
    </label>

    <label>Stärke</label>
    <input id="beatFadeStrength" type="range" min="1" max="100">

    <label>Jeden X‑ten Beat</label>
    <input id="beatFadeEvery" type="number" min="1" max="16">

    <button onclick="saveConfig()">💾 Speichern</button>
</div>

<div class="section">
    <h2>System</h2>
    <a href="/update"><button>🔄 OTA Update</button></a>
    <button onclick="location.href='/'">⬅️ Zurück</button>
</div>

<script src="script.js"></script>
</body>
</html>
