<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 DMX Controller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="header">
    
    <img src="logo-ui.svg" style="height:40px;">
	<div id="statusBox">
        <span id="levelBar"></span>
        <span id="bpmText">BPM: --</span>
        <span id="beatDot"></span>
    </div>
</div>

<div id="presetGrid"></div>

<div id="bottomBar">
    <button onclick="openConfig()">⚙️ Einstellungen</button>
    <button onclick="savePreset()">💾 Speichern</button>
</div>

<script src="script.js"></script>
</body>
</html>
